name: Monitor Legislativo — Coleta Diária

on:
  schedule:
    - cron: '0 9 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  coletar-e-publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar coleta
        run: python main.py

      - name: Gerar painel
        run: python scripts/gerar_painel.py

      - name: Commitar atualizações
        run: |
          git config user.name  "Monitor DP Bot"
          git config user.email "monitor-dp@github-actions"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: atualização automática $(date '+%d/%m/%Y %H:%M')"
          git push

      - name: Salvar logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: data/log_execucao.txt
          retention-days: 30
