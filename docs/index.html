<script>
let itens = [];
const LIDAS_KEY = "dp_monitor_lidas";

function getLidas() {
  return new Set(JSON.parse(localStorage.getItem(LIDAS_KEY) || "[]"));
}

function saveLidas(s) {
  localStorage.setItem(LIDAS_KEY, JSON.stringify([...s]));
}

function marcarLida(id) {
  const s = getLidas();
  s.add(id);
  saveLidas(s);
  renderizar();
}

function marcarTodasLidas() {
  const s = getLidas();
  itens.forEach(i => s.add(i.id));
  saveLidas(s);
  renderizar();
}

function relBadge(r) {
  return { Alta: "badge-alta", "Média": "badge-media", Baixa: "badge-baixa" }[r] || "badge-baixa";
}

function siglaBadge(s) {
  return "badge-" + (s || "RF");
}

function getLink(item) {
  return item.link_noticia || item.url || "#";
}

function filtrar() {
  const busca = document.getElementById("busca").value.toLowerCase();
  const fonte = document.getElementById("filtroFonte").value;
  const rel = document.getElementById("filtroRelevancia").value;
  const leit = document.getElementById("filtroLeitura").value;
  const lidas = getLidas();

  return itens.filter(i => {
    if (busca && !i.titulo.toLowerCase().includes(busca) && !(i.resumo || "").toLowerCase().includes(busca)) return false;
    if (fonte && i.fonte !== fonte) return false;
    if (rel && i.relevancia !== rel) return false;
    if (leit === "nao" && lidas.has(i.id)) return false;
    if (leit === "sim" && !lidas.has(i.id)) return false;
    return true;
  });
}

function cardHTML(item) {
  const lida = getLidas().has(item.id);
  const link = getLink(item);
  const resumoHTML = item.resumo ? `<div class="item-resumo">${item.resumo}</div>` : "";

  let aiHTML = "";
  if (item.analise_ia) {
    const a = item.analise_ia;
    const procs = (a.processos_afetados || []).map(p => `<span class="tag">${p}</span>`).join("");
    aiHTML = `
      <div class="ai-box">
        <div class="ai-label">Análise IA</div>
        <div class="ai-grid">
          <div class="ai-row"><span class="ai-key">Impacto DP:</span> ${a.impacto_dp || "—"}</div>
          <div class="ai-row"><span class="ai-key">Ação necessária:</span> ${a.acao_necessaria || "—"}</div>
          <div class="ai-row"><span class="ai-key">Prazo:</span> ${a.prazo || "Não especificado"}</div>
          <div class="ai-row"><span class="ai-key">Risco se inativo:</span> ${a.risco_inacao || "—"}</div>
        </div>
        ${procs ? `<div class="tags">${procs}</div>` : ""}
      </div>
    `;
  }

  return `
    <div class="item ${lida ? "" : "unread"}" id="card-${item.id}">
      <div class="item-header">
        <div class="item-title">
          <a href="${link}" target="_blank" rel="noopener noreferrer">${item.titulo}</a>
        </div>
        <span class="badge ${relBadge(item.relevancia)}">${item.relevancia}</span>
      </div>

      <div class="item-meta">
        <a href="${link}" target="_blank" rel="noopener noreferrer" class="badge ${siglaBadge(item.sigla)}" style="text-decoration:none">${item.fonte}</a>
        <span>${item.data_str}</span>
        ${lida ? '<span style="color:#16A34A;font-size:12px">✓ lida</span>' : '<span style="color:#D97706;font-size:12px">● nova</span>'}
      </div>

      ${resumoHTML}
      ${aiHTML}

      <div class="item-actions">
        ${!item.analise_ia ? `<button class="btn btn-primary" onclick="analisarIA('${item.id}')">Analisar com IA</button>` : ""}
        ${!lida ? `<button class="btn" onclick="marcarLida('${item.id}')">Marcar como lida</button>` : ""}
        <a href="${link}" target="_blank" rel="noopener noreferrer" class="btn">Ver notícia</a>
      </div>
    </div>
  `;
}

function renderizar() {
  const lista = filtrar();
  const lidas = getLidas();
  const naoLidas = itens.filter(i => !lidas.has(i.id)).length;
  const altas = itens.filter(i => i.relevancia === "Alta").length;

  document.getElementById("metrics").innerHTML = `
    <div class="metric">
      <div class="metric-label">Total</div>
      <div class="metric-value">${itens.length}</div>
      <div class="metric-sub">no histórico</div>
    </div>
    <div class="metric danger">
      <div class="metric-label">Não lidas</div>
      <div class="metric-value">${naoLidas}</div>
      <div class="metric-sub">requerem atenção</div>
    </div>
    <div class="metric">
      <div class="metric-label">Alta relevância</div>
      <div class="metric-value">${altas}</div>
      <div class="metric-sub">impacto direto no DP</div>
    </div>
    <div class="metric">
      <div class="metric-label">Exibindo</div>
      <div class="metric-value">${lista.length}</div>
      <div class="metric-sub">com filtros atuais</div>
    </div>
  `;

  const el = document.getElementById("lista");
  el.innerHTML = lista.length ? lista.map(cardHTML).join("") : `<div class="empty">Nenhuma atualização encontrada.</div>`;
}

async function carregarDados() {
  try {
    const resp = await fetch("../data/atualizacoes.json?v=" + Date.now());
    const json = await resp.json();

    itens = (json.atualizacoes || []).map(i => ({
      ...i,
      resumo: i.resumo || i.analise_ia?.resumo || ""
    }));

    document.getElementById("ultima").textContent = json.ultima_atualizacao || "—";
    renderizar();
  } catch (e) {
    console.error("Erro ao carregar JSON:", e);
    document.getElementById("lista").innerHTML = `<div class="empty">Erro ao carregar atualizações.</div>`;
    document.getElementById("ultima").textContent = "Erro";
  }
}

async function analisarIA(id) {
  const item = itens.find(i => i.id === id);
  if (!item) return;

  const btn = document.getElementById("card-" + id).querySelector("button.btn-primary");
  btn.innerHTML = `<span class="spinner"></span> Analisando...`;
  btn.disabled = true;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 600,
        system: `Especialista em DP brasileiro. Responda SOMENTE com JSON válido sem markdown:
{"resumo":"...","impacto_dp":"...","acao_necessaria":"...","prazo":"...","risco_inacao":"...","processos_afetados":[]}`,
        messages: [{
          role: "user",
          content: `Fonte: ${item.fonte}
Título: ${item.titulo}
Resumo: ${item.resumo || ""}
URL: ${getLink(item)}`
        }]
      })
    });

    const data = await res.json();
    item.analise_ia = JSON.parse(
      (data.content || []).map(c => c.text || "").join("").replace(/```json|```/g, "").trim()
    );
    renderizar();
  } catch (e) {
    btn.innerHTML = "Erro — tente novamente";
    btn.disabled = false;
  }
}

function exportarExcel() {
  const ws_data = [
    ["Título", "Fonte", "Data", "Relevância", "Resumo", "Lida", "URL", "Impacto DP", "Ação", "Prazo"],
    ...itens.map(i => [
      i.titulo,
      i.fonte,
      i.data_str,
      i.relevancia,
      i.resumo || "",
      getLidas().has(i.id) ? "Sim" : "Não",
      getLink(i),
      i.analise_ia?.impacto_dp || "",
      i.analise_ia?.acao_necessaria || "",
      i.analise_ia?.prazo || ""
    ])
  ];

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws["!cols"] = [{wch:55},{wch:22},{wch:12},{wch:10},{wch:50},{wch:6},{wch:50},{wch:40},{wch:40},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, "Atualizações");
  XLSX.writeFile(wb, "monitor_legislativo_dp.xlsx");
}

function exportarPDF() {
  const linhas = itens.map(i => `
    <tr style="border-bottom:1px solid #eee">
      <td style="padding:8px 6px;font-size:11px">${i.data_str}</td>
      <td style="padding:8px 6px;font-size:11px;color:#1D4ED8">${i.fonte}</td>
      <td style="padding:8px 6px;font-size:11px">
        <strong>${i.titulo}</strong>
        ${i.resumo ? `<br><span style="color:#64748B;font-size:10px">${i.resumo.substring(0,120)}...</span>` : ""}
      </td>
      <td style="padding:8px 6px;font-size:11px;color:${i.relevancia==="Alta"?"#DC2626":i.relevancia==="Média"?"#D97706":"#6B7280"}">${i.relevancia}</td>
      <td style="padding:8px 6px;font-size:11px">${i.analise_ia?.acao_necessaria || "—"}</td>
    </tr>
  `).join("");

  document.getElementById("pdf-content").innerHTML = `
    <h3 style="margin-bottom:8px">Relatório — Monitor Legislativo DP</h3>
    <p style="font-size:12px;color:#666;margin-bottom:12px">Gerado em: ${new Date().toLocaleDateString("pt-BR")}</p>
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="background:#1E3A5F;color:#fff">
          <th style="padding:8px 6px;font-size:11px;text-align:left">Data</th>
          <th style="padding:8px 6px;font-size:11px;text-align:left">Fonte</th>
          <th style="padding:8px 6px;font-size:11px;text-align:left">Título/Resumo</th>
          <th style="padding:8px 6px;font-size:11px;text-align:left">Relevância</th>
          <th style="padding:8px 6px;font-size:11px;text-align:left">Ação</th>
        </tr>
      </thead>
      <tbody>${linhas}</tbody>
    </table>
  `;
  document.getElementById("modalPDF").classList.add("open");
}

function fecharModal() {
  document.getElementById("modalPDF").classList.remove("open");
}

carregarDados();
</script>
