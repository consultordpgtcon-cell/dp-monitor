<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Legislativo — Departamento Pessoal</title>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;--text:#0F172A;--muted:#64748B;--accent:#1E3A5F;--red:#DC2626;--red-l:#FEF2F2;--amber:#D97706;--amber-l:#FFFBEB;--green:#16A34A;--green-l:#F0FDF4;--blue:#1D4ED8;--blue-l:#EFF6FF;--purple:#7C3AED;--purple-l:#F5F3FF;--radius:10px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
    header{background:var(--accent);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    header h1{font-size:18px;font-weight:600}
    header p{font-size:12px;opacity:.75;margin-top:2px}
    .live-badge{background:rgba(255,255,255,.15);border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
    .live-dot{width:7px;height:7px;background:#4ADE80;border-radius:50%;animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .container{max-width:960px;margin:0 auto;padding:20px 16px}
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
    .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
    .metric-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .metric-value{font-size:26px;font-weight:600}
    .metric-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .metric.danger .metric-value{color:var(--red)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
    .toolbar select,.toolbar input{border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;background:var(--surface);color:var(--text)}
    .toolbar input{flex:1;min-width:200px}
    .btn{border:1px solid var(--border);border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;background:var(--surface);color:var(--text);white-space:nowrap;text-decoration:none;display:inline-block}
    .btn:hover{background:var(--bg)}
    .btn-primary{background:var(--accent);color:#fff;border-color:transparent}
    .btn-primary:hover{opacity:.88}
    .btn-success{background:var(--green);color:#fff;border-color:transparent}
    .items{display:flex;flex-direction:column;gap:10px}
    .item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border-color .15s}
    .item:hover{border-color:#94A3B8}
    .item.unread{border-left:3px solid var(--accent)}
    .item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
    .item-title{font-size:14px;font-weight:600;line-height:1.4;flex:1}
    .item-title a{color:var(--accent);text-decoration:none}
    .item-title a:hover{text-decoration:underline}
    .item-meta{font-size:12px;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;align-items:center}
    .item-resumo{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;padding:10px 12px;background:var(--bg);border-radius:6px;border-left:3px solid var(--border)}
    .badge{font-size:11px;font-weight:600;padding:2px 9px;border-radius:99px;white-space:nowrap}
    .badge-alta{background:var(--red-l);color:var(--red)}
    .badge-media{background:var(--amber-l);color:var(--amber)}
    .badge-baixa{background:#F1F5F9;color:var(--muted)}
    .badge-RF{background:var(--blue-l);color:var(--blue)}
    .badge-MTE{background:var(--green-l);color:var(--green)}
    .badge-ES{background:#FFF7ED;color:#C2410C}
    .badge-TST{background:var(--purple-l);color:var(--purple)}
    .badge-PES{background:#FFF7ED;color:#9A3412}
    .ai-box{background:var(--green-l);border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:10px 14px;margin-top:10px;font-size:13px;color:#166534;line-height:1.6}
    .ai-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:5px}
    .ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
    .ai-row{font-size:12px}
    .ai-key{font-weight:600}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .tag{font-size:11px;background:#F1F5F9;color:#334155;padding:2px 8px;border-radius:4px}
    .item-actions{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:var(--surface);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto}
    .modal h2{font-size:16px;margin-bottom:16px}
    .modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
    .empty{text-align:center;padding:48px 16px;color:var(--muted)}
    .loading{text-align:center;padding:48px 16px;color:var(--muted)}
    footer{text-align:center;padding:32px 16px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);margin-top:32px}
  </style>
</head>
<body>
<header>
  <div>
    <h1>Monitor Legislativo — DP</h1>
    <p>Receita Federal · Ministerio do Trabalho · eSocial · TST · Portal eSocial</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <span class="live-badge"><span class="live-dot"></span> Automatico</span>
    <button class="btn btn-success" onclick="exportarExcel()">Exportar Excel</button>
    <button class="btn btn-primary" onclick="exportarPDF()">Exportar PDF</button>
  </div>
</header>
<div class="container">
  <div class="metrics" id="metrics"></div>
  <div class="toolbar">
    <input type="text" id="busca" placeholder="Buscar por palavra-chave..." oninput="renderizar()">
    <select id="filtroFonte" onchange="renderizar()">
      <option value="">Todas as fontes</option>
      <option>Receita Federal</option>
      <option>Min. do Trabalho e Emprego</option>
      <option>eSocial</option>
      <option>TST</option>
      <option>Portal eSocial</option>
    </select>
    <select id="filtroRelevancia" onchange="renderizar()">
      <option value="">Toda relevancia</option>
      <option>Alta</option>
      <option>Media</option>
      <option>Baixa</option>
    </select>
    <select id="filtroLeitura" onchange="renderizar()">
      <option value="">Todas</option>
      <option value="nao">Nao lidas</option>
      <option value="sim">Lidas</option>
    </select>
    <button class="btn" onclick="marcarTodasLidas()">Marcar todas lidas</button>
  </div>
  <div class="items" id="lista"><div class="loading">Carregando atualizacoes...</div></div>
</div>
<div class="modal-bg" id="modalPDF">
  <div class="modal">
    <button class="modal-close" onclick="fecharModal()">x</button>
    <h2>Exportar Relatorio PDF</h2>
    <div id="pdf-content"></div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="window.print()">Imprimir / Salvar PDF</button>
      <button class="btn" onclick="fecharModal()">Fechar</button>
    </div>
  </div>
</div>
<footer>Ultima coleta: <strong id="ultima">carregando...</strong> · Gerado automaticamente via GitHub Actions</footer>
<script>
var REPO = 'consultordpgtcon-cell/dp-monitor';
var JSON_URL = 'https://raw.githubusercontent.com/' + REPO + '/main/data/atualizacoes.json';
var itens = [];
var LIDAS_KEY = 'dp_lidas';

function getLidas(){return new Set(JSON.parse(localStorage.getItem(LIDAS_KEY)||'[]'));}
function saveLidas(s){localStorage.setItem(LIDAS_KEY,JSON.stringify([...s]));}
function marcarLida(id){var s=getLidas();s.add(id);saveLidas(s);renderizar();}
function marcarTodasLidas(){var s=getLidas();itens.forEach(function(i){s.add(i.id);});saveLidas(s);renderizar();}
function relBadge(r){return r==='Alta'?'badge-alta':r==='Media'||r==='Media'?'badge-media':'badge-baixa';}
function siglaBadge(s){return 'badge-'+(s||'RF');}

function esc(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filtrar(){
  var busca=document.getElementById('busca').value.toLowerCase();
  var fonte=document.getElementById('filtroFonte').value;
  var rel=document.getElementById('filtroRelevancia').value;
  var leit=document.getElementById('filtroLeitura').value;
  var lidas=getLidas();
  return itens.filter(function(i){
    if(busca&&i.titulo.toLowerCase().indexOf(busca)<0&&(i.resumo||'').toLowerCase().indexOf(busca)<0)return false;
    if(fonte&&i.fonte!==fonte)return false;
    if(rel&&i.relevancia!==rel)return false;
    if(leit==='nao'&&lidas.has(i.id))return false;
    if(leit==='sim'&&!lidas.has(i.id))return false;
    return true;
  });
}

function cardHTML(item){
  var lida=getLidas().has(item.id);
  var url=esc(item.url);
  var resumoHTML=item.resumo?'<div class="item-resumo">'+esc(item.resumo)+'</div>':'';
  var aiHTML='';
  if(item.analise_ia){
    var a=item.analise_ia;
    var procs=(a.processos_afetados||[]).map(function(p){return '<span class="tag">'+esc(p)+'</span>';}).join('');
    aiHTML='<div class="ai-box"><div class="ai-label">Analise IA</div><div class="ai-grid">'
      +'<div class="ai-row"><span class="ai-key">Impacto DP:</span> '+esc(a.impacto_dp)+'</div>'
      +'<div class="ai-row"><span class="ai-key">Acao necessaria:</span> '+esc(a.acao_necessaria)+'</div>'
      +'<div class="ai-row"><span class="ai-key">Prazo:</span> '+esc(a.prazo)+'</div>'
      +'<div class="ai-row"><span class="ai-key">Risco se inativo:</span> '+esc(a.risco_inacao)+'</div>'
      +'</div>'+(procs?'<div class="tags">'+procs+'</div>':'')+'</div>';
  }
  var acoes='';
  if(!item.analise_ia)acoes+='<button class="btn btn-primary" onclick="analisarIA(\''+item.id+'\')">Analisar com IA</button>';
  if(!lida)acoes+='<button class="btn" onclick="marcarLida(\''+item.id+'\')">Marcar como lida</button>';
  acoes+='<a href="'+url+'" target="_blank" class="btn">Ver noticia</a>';
  return '<div class="item'+(lida?'':' unread')+'" id="card-'+item.id+'">'
    +'<div class="item-header"><div class="item-title"><a href="'+url+'" target="_blank">'+esc(item.titulo)+'</a></div>'
    +'<span class="badge '+relBadge(item.relevancia)+'">'+esc(item.relevancia)+'</span></div>'
    +'<div class="item-meta">'
    +'<a href="'+url+'" target="_blank" class="badge '+siglaBadge(item.sigla)+'" style="text-decoration:none">'+esc(item.fonte)+'</a>'
    +'<span>'+esc(item.data_str)+'</span>'
    +(lida?'<span style="color:#16A34A;font-size:12px">lida</span>':'<span style="color:#D97706;font-size:12px">nova</span>')
    +'</div>'+resumoHTML+aiHTML
    +'<div class="item-actions">'+acoes+'</div></div>';
}

function renderizar(){
  var lista=filtrar();
  var lidas=getLidas();
  var naoLidas=itens.filter(function(i){return !lidas.has(i.id);}).length;
  var altas=itens.filter(function(i){return i.relevancia==='Alta';}).length;
  document.getElementById('metrics').innerHTML=
    '<div class="metric"><div class="metric-label">Total</div><div class="metric-value">'+itens.length+'</div><div class="metric-sub">no historico</div></div>'
    +'<div class="metric danger"><div class="metric-label">Nao lidas</div><div class="metric-value">'+naoLidas+'</div><div class="metric-sub">requerem atencao</div></div>'
    +'<div class="metric"><div class="metric-label">Alta relevancia</div><div class="metric-value">'+altas+'</div><div class="metric-sub">impacto direto no DP</div></div>'
    +'<div class="metric"><div class="metric-label">Exibindo</div><div class="metric-value">'+lista.length+'</div><div class="metric-sub">com filtros atuais</div></div>';
  document.getElementById('lista').innerHTML=lista.length
    ?lista.map(cardHTML).join('')
    :'<div class="empty">Nenhuma atualizacao encontrada.</div>';
}

function carregarDados(){
  fetch(JSON_URL+'?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(dados){
      document.getElementById('ultima').textContent=dados.ultima_atualizacao||'--';
      itens=dados.atualizacoes||[];
      renderizar();
    })
    .catch(function(e){
      document.getElementById('lista').innerHTML='<div class="empty">Erro ao carregar dados: '+e.message+'<br>Tente recarregar a pagina.</div>';
    });
}

async function analisarIA(id){
  var item=itens.find(function(i){return i.id===id;});
  if(!item)return;
  var btn=document.getElementById('card-'+id).querySelector('button.btn-primary');
  btn.innerHTML='<span class="spinner"></span> Analisando...';
  btn.disabled=true;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:600,
        system:'Especialista em DP brasileiro. Responda SOMENTE com JSON valido sem markdown:\n{"resumo":"...","impacto_dp":"...","acao_necessaria":"...","prazo":"...","risco_inacao":"...","processos_afetados":[]}',
        messages:[{role:'user',content:'Fonte: '+item.fonte+'\nTitulo: '+item.titulo+'\nURL: '+item.url}]
      })
    });
    var data=await res.json();
    var text=(data.content||[]).map(function(c){return c.text||'';}).join('').replace(/```json|```/g,'').trim();
    item.analise_ia=JSON.parse(text);
    renderizar();
  }catch(e){btn.innerHTML='Erro - tente novamente';btn.disabled=false;}
}

function exportarExcel(){
  var ws_data=[['Titulo','Fonte','Data','Relevancia','Resumo','Lida','URL','Impacto DP','Acao','Prazo']];
  itens.forEach(function(i){
    ws_data.push([i.titulo,i.fonte,i.data_str,i.relevancia,i.resumo||'',getLidas().has(i.id)?'Sim':'Nao',i.url,i.analise_ia&&i.analise_ia.impacto_dp||'',i.analise_ia&&i.analise_ia.acao_necessaria||'',i.analise_ia&&i.analise_ia.prazo||'']);
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols']=[{wch:55},{wch:22},{wch:12},{wch:10},{wch:50},{wch:6},{wch:50},{wch:40},{wch:40},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws,'Atualizacoes');
  XLSX.writeFile(wb,'monitor_legislativo_dp.xlsx');
}

function exportarPDF(){
  var linhas='';
  itens.forEach(function(i){
    linhas+='<tr style="border-bottom:1px solid #eee">'
      +'<td style="padding:8px 6px;font-size:11px">'+esc(i.data_str)+'</td>'
      +'<td style="padding:8px 6px;font-size:11px;color:#1D4ED8">'+esc(i.fonte)+'</td>'
      +'<td style="padding:8px 6px;font-size:11px"><strong>'+esc(i.titulo)+'</strong>'+(i.resumo?'<br><span style="color:#64748B;font-size:10px">'+esc(i.resumo.substring(0,120))+'...</span>':'')+'</td>'
      +'<td style="padding:8px 6px;font-size:11px;color:'+(i.relevancia==='Alta'?'#DC2626':'#D97706')+'">'+esc(i.relevancia)+'</td>'
      +'<td style="padding:8px 6px;font-size:11px">'+(i.analise_ia&&i.analise_ia.acao_necessaria?esc(i.analise_ia.acao_necessaria):'--')+'</td>'
      +'</tr>';
  });
  document.getElementById('pdf-content').innerHTML='<h3 style="margin-bottom:8px">Relatorio Monitor Legislativo DP</h3>'
    +'<p style="font-size:12px;color:#666;margin-bottom:12px">Gerado em: '+new Date().toLocaleDateString('pt-BR')+'</p>'
    +'<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="background:#1E3A5F;color:#fff">'
    +'<th style="padding:8px 6px;font-size:11px;text-align:left">Data</th>'
    +'<th style="padding:8px 6px;font-size:11px;text-align:left">Fonte</th>'
    +'<th style="padding:8px 6px;font-size:11px;text-align:left">Titulo/Resumo</th>'
    +'<th style="padding:8px 6px;font-size:11px;text-align:left">Relevancia</th>'
    +'<th style="padding:8px 6px;font-size:11px;text-align:left">Acao</th>'
    +'</tr></thead><tbody>'+linhas+'</tbody></table>';
  document.getElementById('modalPDF').classList.add('open');
}

function fecharModal(){document.getElementById('modalPDF').classList.remove('open');}

carregarDados();
</script>
</body>
</html>
